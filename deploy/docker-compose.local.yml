services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: hospital-assessment-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSPITAL_API_PORT: 3010
      HOSPITAL_JWT_SECRET: ${HOSPITAL_JWT_SECRET}
      HOSPITAL_CORS_ORIGINS: ${HOSPITAL_CORS_ORIGINS}
      HOSPITAL_TASK_EVIDENCE_UPLOAD_DIR: /app/server/data/uploads/task-evidence
      HOSPITAL_TASK_EVIDENCE_MAX_SIZE: 20971520
    volumes:
      - ../server/data:/app/server/data
    expose:
      - '3010'

  nginx:
    build:
      context: ..
      dockerfile: Dockerfile.web
    container_name: hospital-assessment-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '5173:5173'

networks:
  default:
    name: hospital-assessment-net
